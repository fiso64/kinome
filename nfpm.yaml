name: "kinome"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "fee soh shixty four"
description: "A media server and manager"
vendor: "Kinome"
homepage: "https://github.com/fiso64/kinome"
license: "AGPL-3.0"

contents:
  # 1. The Binary
  - src: "${BUILD_DIR}/kinome"
    dst: "/opt/kinome/kinome"
    file_info:
      mode: 0755

  # 2. The Frontend Assets (Recursive copy)
  - src: "${BUILD_DIR}/out"
    dst: "/opt/kinome/out"

  # 3. Public Assets (Handler installers)
  - src: "${BUILD_DIR}/public"
    dst: "/opt/kinome/public"

  # 4. Systemd Service
  - src: "./packaging/kinome.service"
    dst: "/lib/systemd/system/kinome.service"

# Metadata scripts
scripts:
  postinstall: "./packaging/postinstall.sh"