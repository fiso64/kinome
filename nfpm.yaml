name: "media-browser"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "fee soh shixty four"
description: "A media server and manager"
vendor: "Media Browser"
homepage: "https://github.com/fiso64/media-browser"
license: "AGPL-3.0"

contents:
  # 1. The Binary
  - src: "${BUILD_DIR}/media-browser"
    dst: "/opt/media-browser/media-browser"
    file_info:
      mode: 0755

  # 2. The Frontend Assets (Recursive copy)
  - src: "${BUILD_DIR}/out"
    dst: "/opt/media-browser/out"

  # 3. Systemd Service
  - src: "./packaging/media-browser.service"
    dst: "/lib/systemd/system/media-browser.service"

# Metadata scripts
scripts:
  postinstall: "./packaging/postinstall.sh"